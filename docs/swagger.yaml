definitions:
  model.Player:
    properties:
      abbrPosition:
        description: The abbreviated form of the Player's position
        type: string
      dateOfBirth:
        description: The date of birth of the Player
        type: string
      firstName:
        description: The first name of the Player
        type: string
      id:
        description: Internal UUID (server-generated, opaque to clients)
        type: string
      lastName:
        description: The last name of the Player
        type: string
      league:
        description: The league where the team plays
        type: string
      middleName:
        description: The middle name of the Player, if any
        type: string
      position:
        description: The playing position of the Player
        type: string
      squadNumber:
        description: User-facing unique identifier; DB-enforced uniqueness
        maximum: 99
        minimum: 1
        type: integer
      starting11:
        description: Indicates whether the Player is in the starting 11
        type: boolean
      team:
        description: The team to which the Player belongs
        type: string
    required:
    - abbrPosition
    - dateOfBirth
    - firstName
    - lastName
    - league
    - position
    - team
    type: object
info:
  contact: {}
paths:
  /players:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Player'
            type: array
        "500":
          description: Internal Server Error
      summary: Retrieves all players
      tags:
      - players
    post:
      consumes:
      - application/json
      parameters:
      - description: Player
        in: body
        name: player
        required: true
        schema:
          $ref: '#/definitions/model.Player'
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "409":
          description: Conflict
        "422":
          description: Unprocessable Entity
        "500":
          description: Internal Server Error
      summary: Creates a Player
      tags:
      - players
  /players/{id}:
    get:
      parameters:
      - description: Player.ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Player'
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Retrieves a Player by its internal UUID
      tags:
      - players
  /players/squadnumber/{squadnumber}:
    delete:
      parameters:
      - description: Player.SquadNumber
        in: path
        name: squadnumber
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Deletes a Player by its Squad Number
      tags:
      - players
    get:
      parameters:
      - description: Player.SquadNumber
        in: path
        name: squadnumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Player'
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Retrieves a Player by its Squad Number
      tags:
      - players
    put:
      consumes:
      - application/json
      parameters:
      - description: Player.SquadNumber
        in: path
        name: squadnumber
        required: true
        type: string
      - description: Player
        in: body
        name: player
        required: true
        schema:
          $ref: '#/definitions/model.Player'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "422":
          description: Unprocessable Entity
        "500":
          description: Internal Server Error
      summary: Updates (entirely) a Player by its Squad Number
      tags:
      - players
swagger: "2.0"
