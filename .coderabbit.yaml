# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# https://docs.coderabbit.ai/getting-started/configure-coderabbit

# CodeRabbit Configuration
# Optimized for Go 1.26 / Gin RESTful API project

language: en-US
early_access: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: false
  poem: false
  abort_on_close: true

  path_instructions:
    - path: "**/*.go"
      instructions: |
        - Follow idiomatic Go naming conventions (camelCase for unexported, PascalCase for exported)
        - Ensure proper error handling (always check and handle errors)
        - Verify package documentation comments exist
        - Check imports are grouped: standard library, then third-party, then local
        - Validate proper use of goroutines and channels if concurrency is used
        - Ensure defer statements are used appropriately
        - Check that CGO_ENABLED=1 is considered for SQLite operations

    - path: "controller/**/*.go"
      instructions: |
        - Controllers should be thin - delegate to services
        - Verify Swagger/OpenAPI annotations are present and complete
        - Check proper HTTP status codes (200, 201, 204, 404, 409)
        - Ensure functions use Go's (T, error) multiple-return pattern for fallible operations and errors are handled by callers
        - Validate that request/response models are used (not internal entities)
        - Check that Gin context is used properly (c.JSON, c.Status, etc.)

    - path: "service/**/*.go"
      instructions: |
        - Services should contain business logic
        - Verify GORM operations are used (no raw SQL)
        - Check proper error propagation to controllers
        - Ensure thread-safe operations with Mutex when needed
        - Validate business rules (e.g., unique squad numbers)

    - path: "route/**/*.go"
      instructions: |
        - Route configuration should be clean and organized
        - Verify cache middleware is applied to GET endpoints
        - Check ClearCache wrapper is used for POST/PUT/DELETE
        - Ensure path constants are defined in path.go
        - Validate proper route grouping and organization

    - path: "data/**/*.go"
      instructions: |
        - Verify GORM database connection is properly configured
        - Check SQLite driver is properly initialized
        - Ensure database connection uses proper connection pooling
        - Validate error handling during database initialization

    - path: "model/**/*.go"
      instructions: |
        - Use Go struct tags for serialization (e.g., `json:"fieldName"`)
        - Verify camelCase JSON serialization with struct tags
        - Ensure proper GORM struct tags for database mapping
        - Validate ID field uses UUID v4 (server-generated on create, never client-supplied)

    - path: "tests/**/*.go"
      instructions: |
        - Tests should use testify for assertions
        - Verify test naming follows TestRequest{METHOD}{Resource}{Condition}Response{Outcome} pattern
          (e.g. TestRequestGETPlayerByIDExistingResponseStatusOK)
        - Check Given-When-Then/AAA structure
        - Ensure test database uses in-memory SQLite
        - Validate test data is loaded from tests/players.json
        - Use MockPlayerService only for error branches unreachable with a healthy database
        - Check coverage targets (80% for services, controllers, routes)

    - path: "**/*_test.go"
      instructions: |
        - Tests should use testify for assertions
        - Verify test naming follows TestRequest{METHOD}{Resource}{Condition}Response{Outcome} pattern
          (e.g. TestRequestGETPlayerByIDExistingResponseStatusOK)
        - Use table-driven tests for multiple test cases
        - Use external test packages (package_name_test) for black-box testing, or same package for white-box testing
        - Mock external dependencies appropriately
        - Test both success and error paths

    - path: "main.go"
      instructions: |
        - Verify proper database connection on startup
        - Check Gin router setup and configuration
        - Ensure graceful error handling (fail-fast on critical errors)
        - Validate server configuration (port 9000, localhost binding)

    - path: "docs/**"
      instructions: |
        - These are auto-generated by swag - DO NOT EDIT MANUALLY
        - Ensure docs are regenerated after controller annotation changes (swag init)

    - path: "swagger/**/*.go"
      instructions: |
        - Verify Swagger configuration is correct
        - Check API metadata (title, description, version)
        - Ensure proper host and schemes are configured

    - path: "**/Dockerfile"
      instructions: |
        - Verify multi-stage build (builder + runtime)
        - Check Go version matches project (1.26)
        - Ensure CGO dependencies are installed (gcc, musl-dev, sqlite-dev)
        - Validate non-root user is used for security
        - Check HEALTHCHECK instruction is present
        - Ensure CGO_ENABLED=1 during build for SQLite support

    - path: "go.mod"
      instructions: |
        - Verify Go version is 1.26
        - Check dependencies are up to date
        - Ensure replace directives are justified
        - Validate module path is correct

  path_filters:
    - "!**/vendor/**"
    - "!**/storage/**"
    - "!**/*.db"
    - "!**/*.db-shm"
    - "!**/*.db-wal"
    - "!**/coverage.out"
    - "!**/docs/docs.go"
    - "!**/docs/swagger.json"
    - "!**/docs/swagger.yaml"

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
    drafts: false
    base_branches:
      - master
      - main

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    custom:
      - name: "sync documentation"
        instructions: |
          This is a PoC/learning project targeting developers unfamiliar with the stack.
          Documentation is a first-class concern. Review the PR changes and perform the
          following three checks:

          ## 1. Method/function docstrings
          For every public function, method, or handler touched in the PR:
          - If it lacks a docstring/doc comment, add one using the idiomatic format
            for the language and framework in use.
          - If it has one but no longer matches the current signature, parameters,
            or behavior, update it.
          - Docstrings should explain *why* and *what*, not just restate the signature.
            Assume the reader is learning the language.

          ## 2. README.md
          Check whether the PR introduces or removes endpoints, changes behavior,
          adds dependencies, or modifies how to run the project.
          If so, update the relevant sections of README.md to reflect the current state.
          Do not rewrite sections unrelated to the changes.

          ## 3. .github/copilot-instructions.md
          If the PR introduces patterns, conventions, or architectural decisions that
          should guide future AI-assisted contributions, add or update the relevant
          instructions in .github/copilot-instructions.md.
          Focus on things a developer (or AI assistant) unfamiliar with this specific
          stack implementation should know before writing code here.

      - name: "enforce http error handling"
        instructions: |
          Audit all HTTP handler functions in the changed files.
          Verify that errors return appropriate HTTP status codes (400 for bad input,
          404 for not found, 500 for unexpected errors) and a consistent JSON error
          body with at least a "message" field.
          Flag handlers that return 200 on error, swallow errors silently, or use
          bare status-only responses without a JSON body.
          Do not make changes; only report findings as a comment so fixes can be
          applied consistently across the entire codebase.

      - name: "idiomatic review"
        instructions: |
          Review the changed files for non-idiomatic patterns given the language and
          framework in use. Flag code that looks like it was translated from another
          language rather than written naturally for this stack. Suggest idiomatic
          alternatives with brief explanations. This is a PoC comparison project,
          so idiomatic usage is a first-class concern.

      - name: "verify api contract"
        instructions: |
          Review the changed files and verify that all HTTP endpoints (method, path,
          request body shape, and response shape) match the project's intended REST API
          contract. Check the README or any spec/contract file in the repo for reference.
          Flag any deviations — missing fields, wrong status codes, inconsistent naming.
          Do not make changes; only report findings as a comment.

  pre_merge_checks:
    docstrings:
      mode: warning
      threshold: 80
    title:
      mode: warning
      requirements: |
        - Use Conventional Commits format (feat:, fix:, chore:, docs:, test:, refactor:)
        - Keep under 80 characters
        - Be descriptive and specific
    description:
      mode: off
    issue_assessment:
      mode: off

  tools:
    # Secret scanners
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true

    # IaC / infrastructure
    checkov:
      enabled: true
    trivy:
      enabled: true
    hadolint:
      enabled: true

    # General static analysis
    semgrep:
      enabled: true
    opengrep:
      enabled: true
    golangci-lint:
      enabled: true
    shellcheck:
      enabled: true

    # File-type linters
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    markdownlint:
      enabled: true
    dotenvLint:
      enabled: true
    checkmake:
      enabled: true
    osvScanner:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 120000

    # Disable irrelevant tools for this Go project
    ruff:
      enabled: false
    biome:
      enabled: false
    swiftlint:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    detekt:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    clippy:
      enabled: false
    sqlfluff:
      enabled: false
    prismaLint:
      enabled: false
    pylint:
      enabled: false
    oxc:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    htmlhint:
      enabled: false
    languagetool:
      enabled: false
    circleci:
      enabled: false
    fortitudeLint:
      enabled: false
    stylelint:
      enabled: false
    blinter:
      enabled: false
    psscriptanalyzer:
      enabled: false

chat:
  art: true
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - ".github/copilot-instructions.md"
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  mcp:
    usage: auto

code_generation:
  docstrings:
    language: en-US
    path_instructions:
      - path: "**/*.go"
        instructions: |
          - Use Go doc comments (// Package/Function name ...)
          - Place package documentation in package-level doc comment
          - Document exported functions, types, and methods
          - Keep documentation concise and focused
          - Include Swagger annotations for controller functions
  unit_tests:
    path_instructions:
      - path: "tests/**/*.go"
        instructions: |
          - Use testify framework for assertions
          - Follow Test<Method><Scenario>Response<Expected> naming
          - Use Given-When-Then or AAA structure with comments
          - Create test fixtures in separate files (e.g., player_fake.go)
          - Use in-memory SQLite for test database
          - Target 80% coverage for controllers, services, and routes

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - planning
  labeling:
    labeling_instructions: []
    auto_apply_labels: false
