# Project identification
sonar.projectKey=nanotaboada_go-samples-gin-restful
sonar.organization=nanotaboada
sonar.projectName=go-samples-gin-restful
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=controller,data,model,route,service,swagger,main.go
sonar.tests=tests

# Exclude non-production paths from analysis
sonar.exclusions=\
  docs/**, \
  scripts/**, \
  storage/**, \
  tests/**

# Include tests/ explicitly for test analysis
sonar.test.inclusions=tests/**

# Exclude infrastructure/boilerplate from coverage metrics
# (mirrors codecov.yml ignore list — focus on controller/, route/, service/)
sonar.coverage.exclusions=\
  data/**, \
  model/**, \
  swagger/**, \
  main.go

# Coverage report generated by: go test ./... -coverprofile=coverage.out
sonar.go.coverage.reportPaths=coverage.out
