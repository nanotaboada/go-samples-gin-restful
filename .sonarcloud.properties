# =============================================================================
# SonarCloud Automatic Analysis configuration
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/automatic-analysis/
#
# SonarCloud's automatic analysis (GitHub App, no CI workflow) reads THIS file.
# Wildcard patterns are NOT supported here, so all exclusion paths must be
# listed explicitly.
# =============================================================================

sonar.projectKey=nanotaboada_go-samples-gin-restful
sonar.organization=nanotaboada
sonar.projectName=go-samples-gin-restful

sonar.sources=controller,data,model,route,service,swagger,main.go
sonar.tests=tests

# =============================================================================
# Global exclusions
# Auto-generated Swagger docs and test support files excluded from analysis.
# =============================================================================

sonar.exclusions=\
  docs/docs.go,\
  tests/main_test.go,\
  tests/mock_service.go,\
  tests/player_fake.go

# =============================================================================
# Coverage exclusions
# Mirrors codecov.yml ignore list — focus on controller/, route/, service/
# =============================================================================

sonar.coverage.exclusions=\
  data/player_data.go,\
  docs/docs.go,\
  model/player_model.go,\
  swagger/swagger.go,\
  tests/main_test.go,\
  tests/mock_service.go,\
  tests/player_fake.go,\
  main.go

# =============================================================================
# Duplicate code (CPD) exclusions
# Automatic analysis does not support wildcard patterns, so each file is
# listed explicitly.
#
# player_data.go — player seed data; repetitive insert calls by design.
# player_fake.go — test fixture; parallel field assignments by design.
# =============================================================================

sonar.cpd.exclusions=\
  data/player_data.go,\
  tests/player_fake.go

# Coverage report generated by:
# go test ./... -coverprofile=coverage.out
sonar.go.coverage.reportPaths=coverage.out
